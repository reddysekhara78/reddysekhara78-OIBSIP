<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Play Game</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="icon" type="image/png" th:href="@{/images/game-icon.png}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">🎮 Guessing Game</a>

        <div>
            <a class="btn btn-outline-light me-2" href="/">Home</a>
            <a class="btn btn-outline-light me-2" href="/start">Play</a>
            <a class="btn btn-outline-light me-2" href="/dashboard">Dashboard</a>
            <a class="btn btn-outline-light me-2" href="/about">About</a>
            <a class="btn btn-outline-light" href="/contact">Contact</a>
        </div>

    </div>
</nav>

<div class="container">

    <div class="card game-card">

        <h2 class="mb-3">
            🎮 Welcome,
            <span th:text="${player}"></span>
        </h2>

        <hr>

        <p class="fs-5">
            <strong>Difficulty:</strong>
            <span class="text-primary" th:text="${difficulty}"></span>
        </p>

        <p class="fs-5">
            <strong>Remaining Attempts:</strong>
            <span class="badge bg-warning text-dark"
                  th:text="${attempts}"></span>
        </p>

        <!-- Guess Form -->
        <form th:action="@{/guess}"
              method="post"
              th:object="${guess}"
              th:if="${message == null or (!#strings.contains(message,'Congratulations') and !#strings.contains(message,'Game Over'))}">

            <div class="mb-3">

                <input
                        type="number"
                        class="form-control form-control-lg"
                        th:field="*{guess}"
                        placeholder="Enter your guess"
                        required>

            </div>

            <button class="btn btn-primary btn-lg w-100">

                🎯 Guess Number

            </button>

        </form>

        <!-- Message -->

        <div class="mt-4" th:if="${message != null}">

            <div class="alert alert-success"
                 th:if="${#strings.contains(message,'Congratulations')}">

                <h5 th:text="${message}"></h5>

            </div>

            <div class="alert alert-danger"
                 th:if="${#strings.contains(message,'Game Over')}">

                <h5 th:text="${message}"></h5>

            </div>

            <div class="alert alert-warning"
                 th:if="${!#strings.contains(message,'Congratulations') and !#strings.contains(message,'Game Over')}">

                <h5 th:text="${message}"></h5>

            </div>

        </div>

        <!-- Play Again Button (only after game ends) -->

        <div class="text-center mt-4"
             th:if="${message != null and (#strings.contains(message,'Congratulations') or #strings.contains(message,'Game Over'))}">

            <a th:href="@{/playAgain}" class="btn btn-success btn-lg me-2">

                🔄 Play Again

            </a>

            <a th:href="@{/dashboard}" class="btn btn-dark btn-lg me-2">

                📊 Dashboard

            </a>

            <a th:href="@{/}" class="btn btn-secondary btn-lg">

                🏠 Home

            </a>

        </div>

    </div>

</div>
<footer class="bg-dark text-white text-center py-3 mt-5">

    <small>

        © 2026 Number Guessing Game |
        Developed by Reddy Sekhara

    </small>

</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
