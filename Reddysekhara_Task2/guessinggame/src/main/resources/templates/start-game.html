<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Start Game</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="icon" type="image/png" th:href="@{/images/game-icon.png}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">🎮 Guessing Game</a>

        <div>
            <a class="btn btn-outline-light me-2" href="/">Home</a>
            <a class="btn btn-outline-light me-2" href="/start">Play</a>
            <a class="btn btn-outline-light me-2" href="/dashboard">Dashboard</a>
            <a class="btn btn-outline-light me-2" href="/about">About</a>
            <a class="btn btn-outline-light" href="/contact">Contact</a>
        </div>

    </div>
</nav>
<div class="container">

<div class="card game-card">

<h2 class="mb-4">
🎮 Start New Game
</h2>

<form th:action="@{/play}" th:object="${game}" method="post">

<div class="mb-3">

<label class="form-label">
Player Name
</label>

<input
type="text"
class="form-control"
th:field="*{playerName}"
placeholder="Enter your name"
required>

</div>

<div class="mb-4">

<label class="form-label">
Difficulty
</label>

<select
class="form-select"
th:field="*{difficulty}"
required>

<option value="">Select Difficulty</option>

<option value="Easy">Easy</option>

<option value="Medium">Medium</option>

<option value="Hard">Hard</option>

</select>

</div>

<button class="btn btn-success btn-lg w-100">

Start Playing

</button>

</form>

</div>

</div>
<footer class="bg-dark text-white text-center py-3 mt-5">

    <small>

        © 2026 Number Guessing Game |
        Developed by Reddy Sekhara

    </small>

</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
