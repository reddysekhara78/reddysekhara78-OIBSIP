
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">My Reservations</h2>

    <form action="/search" method="get" class="mb-4">

        <div class="row">

            <div class="col-md-10">
                <input type="text"
                       name="pnr"
                       placeholder="Search by PNR"
                       class="form-control">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">
                    Search
                </button>
            </div>

        </div>

    </form>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>PNR</th>
            <th>Passenger</th>
            <th>Train</th>
            <th>Journey Date</th>
            <th>Status</th>
            <th width="250">Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="r : ${reservations}">

            <td th:text="${r.pnr}"></td>

            <td th:text="${r.passengerName}"></td>

            <td th:text="${r.trainName}"></td>

            <td th:text="${r.journeyDate}"></td>

            <td>

                <span class="badge bg-success"
                      th:if="${r.status=='BOOKED'}"
                      th:text="${r.status}">
                </span>

                <span class="badge bg-danger"
                      th:if="${r.status=='CANCELLED'}"
                      th:text="${r.status}">
                </span>

            </td>

            <td>

                <a th:href="@{/ticket/{id}(id=${r.id})}"
                   class="btn btn-primary btn-sm">
                    Ticket
                </a>

                <a th:href="@{/edit/{id}(id=${r.id})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{/cancel/{id}(id=${r.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to cancel this reservation?');">
                    Cancel
                </a>

            </td>

        </tr>

        <tr th:if="${#lists.isEmpty(reservations)}">
            <td colspan="6" class="text-center text-muted">
                No reservations found.
            </td>
        </tr>

        </tbody>

    </table>

    <a href="/dashboard" class="btn btn-secondary">
        Back to Dashboard
    </a>

</div>

</body>

</html>
