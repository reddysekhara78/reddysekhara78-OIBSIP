<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>My Profile</h2>

    <form th:action="@{/profile/update}" method="post" th:object="${user}">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Full Name</label>
            <input type="text"
                   class="form-control"
                   th:field="*{fullName}"
                   required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   class="form-control"
                   th:field="*{email}"
                   required>
        </div>

        <div class="mb-3">
            <label>Mobile</label>
            <input type="text"
                   class="form-control"
                   th:field="*{mobile}"
                   maxlength="10"
                   pattern="[0-9]{10}"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
                   required>
        </div>

        <button class="btn btn-primary">
            Update Profile
        </button>
        <a href="/change-password" class="btn btn-warning">
    Change Password
</a>

        <a href="/dashboard"
           class="btn btn-secondary">
            Dashboard
        </a>

    </form>

</div>

</body>
</html>
