<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Railway Reservation - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:linear-gradient(-45deg,#0f172a,#1e3a8a,#2563eb,#06b6d4);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,.12);

animation:float 10s infinite ease-in-out;

}

.circle:nth-child(1){

width:220px;
height:220px;

top:-60px;
left:-70px;

}

.circle:nth-child(2){

width:150px;
height:150px;

bottom:30px;
right:60px;

animation-delay:2s;

}

.circle:nth-child(3){

width:100px;
height:100px;

top:150px;
right:250px;

animation-delay:4s;

}

@keyframes float{

50%{

transform:translateY(-25px);

}

}

.card{

width:420px;

padding:40px;

border-radius:25px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(20px);

box-shadow:0 10px 30px rgba(0,0,0,.3);

color:white;

z-index:10;

}

.logo{

font-size:60px;

text-align:center;

margin-bottom:10px;

}

.card h2{

text-align:center;

margin-bottom:25px;

font-weight:700;

}

.form-control{

border-radius:12px;

height:48px;

}

.input-group-text{

cursor:pointer;

}

.btn-login{

width:100%;

height:48px;

border-radius:12px;

font-size:18px;

font-weight:600;

transition:.3s;

}

.btn-login:hover{

transform:translateY(-2px);

}

.links{

display:flex;

justify-content:space-between;

margin-top:15px;

}

.links a{

color:white;

text-decoration:none;

font-size:14px;

}

.links a:hover{

text-decoration:underline;

}

.register{

text-align:center;

margin-top:25px;

}

.register a{

color:#fff;

font-weight:bold;

text-decoration:none;

}

.footer{

text-align:center;

margin-top:20px;

font-size:13px;

opacity:.8;

}

</style>

</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="card">

<div class="logo">
🚆
</div>

<h2>Welcome Back</h2>

<form th:action="@{/login}" method="post">

<div class="mb-3">

<input type="email"

name="email"

class="form-control"

placeholder="Email Address"

required>

</div>

<div class="mb-3">

<div class="input-group">

<input type="password"

id="password"

name="password"

class="form-control"

placeholder="Password"

required>

<span class="input-group-text"
onclick="togglePassword()">

<i id="eyeIcon"
class="fa-solid fa-eye"></i>

</span>

</div>

</div>

<div class="form-check">

<input class="form-check-input"

type="checkbox"

id="remember">

<label class="form-check-label">

Remember Me

</label>

</div>

<div class="links">

<a href="/forgot-password">

Forgot Password?

</a>

<a href="/register">

Create Account

</a>

</div>

<br>

<button class="btn btn-warning btn-login">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</form>

<div class="footer">

Online Railway Reservation System © 2026

</div>

</div>

<script>

function togglePassword(){

let p=document.getElementById("password");

let eye=document.getElementById("eyeIcon");

if(p.type==="password"){

p.type="text";

eye.classList.remove("fa-eye");

eye.classList.add("fa-eye-slash");

}

else{

p.type="password";

eye.classList.remove("fa-eye-slash");

eye.classList.add("fa-eye");

}

}

</script>

</body>

</html>
