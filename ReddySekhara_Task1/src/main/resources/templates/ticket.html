
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Railway Ticket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#f5f5f5;

font-family:Arial,sans-serif;

}

.ticket{

max-width:900px;

margin:40px auto;

background:white;

border-radius:15px;

padding:30px;

box-shadow:0 0 20px rgba(0,0,0,.2);

}

.header{

background:#0d6efd;

color:white;

padding:15px;

border-radius:10px;

text-align:center;

margin-bottom:25px;

}

table{

width:100%;

}

td{

padding:10px;

}

.print-btn{

margin-top:25px;

}

@media print{

.print-btn{

display:none;

}

body{

background:white;

}

}

</style>

</head>

<body>

<div class="ticket">

<div class="header">

<h2>ONLINE RAILWAY RESERVATION TICKET</h2>

</div>

<table class="table table-bordered">

<tr>

<th>PNR Number</th>

<td th:text="${reservation.pnr}"></td>

</tr>

<tr>

<th>Passenger Name</th>

<td th:text="${reservation.passengerName}"></td>

</tr>

<tr>

<th>Age</th>

<td th:text="${reservation.age}"></td>

</tr>

<tr>

<th>Gender</th>

<td th:text="${reservation.gender}"></td>

</tr>

<tr>

<th>Train Number</th>

<td th:text="${reservation.trainNumber}"></td>

</tr>

<tr>

<th>Train Name</th>

<td th:text="${reservation.trainName}"></td>

</tr>

<tr>

<th>From</th>

<td th:text="${reservation.source}"></td>

</tr>

<tr>

<th>To</th>

<td th:text="${reservation.destination}"></td>

</tr>

<tr>

<th>Journey Date</th>

<td th:text="${reservation.journeyDate}"></td>

</tr>

<tr>

<th>Travel Class</th>

<td th:text="${reservation.travelClass}"></td>

</tr>

<tr>

<th>Seats</th>

<td th:text="${reservation.seats}"></td>

</tr>

<tr>

<th>Status</th>

<td th:text="${reservation.status}"></td>

</tr>

<tr>

<th>Booking Time</th>

<td th:text="${reservation.bookingDate}"></td>

</tr>

</table>

<div class="text-center print-btn">

<button onclick="window.print()"
class="btn btn-primary">

Print Ticket

</button>

<a href="/dashboard"
class="btn btn-success">

Dashboard

</a>

</div>

</div>

</body>

</html>
```
