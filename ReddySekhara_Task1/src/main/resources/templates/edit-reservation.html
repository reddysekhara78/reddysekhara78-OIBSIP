
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


       <head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Edit Reservation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<link rel="stylesheet"
      th:href="@{/css/edit-reservation.css}">
</head>
    



<body>

<div class="container py-5">

    <div class="edit-card">

        <h1 class="page-title">
            ✏️ Edit Reservation
        </h1>

        <p class="page-subtitle">
            Update your railway reservation details
        </p>

        <form th:action="@{/update}"
              th:object="${reservation}"
              method="post">

            <input type="hidden" th:field="*{id}">

            <!-- Passenger Details -->

            <div class="section">

                <h4>👤 Passenger Details</h4>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Passenger Name</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{passengerName}"
                                required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Age</label>

                        <input
                                type="number"
                                class="form-control"
                                th:field="*{age}"
                                min="1"
                                max="120"
                                required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Gender</label>

                        <select
                                class="form-select"
                                th:field="*{gender}">

                            <option value="Male">Male</option>

                            <option value="Female">Female</option>

                            <option value="Transgender">
                                Transgender
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Mobile</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{mobile}"
                                maxlength="10"
                                pattern="[0-9]{10}"
                                oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
                                required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-12 mb-3">

                        <label>Email</label>

                        <input
                                type="email"
                                class="form-control"
                                th:field="*{email}"
                                required>

                    </div>

                </div>

            </div>

            <!-- Journey Details -->

            <div class="section">

                <h4>🚉 Journey Details</h4>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Source</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{source}"
                                required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Destination</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{destination}"
                                required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Journey Date</label>

                        <input
                                type="date"
                                class="form-control"
                                th:field="*{journeyDate}"
                                required>

                    </div>

                </div>

            </div>

            <!-- Train Details -->

            <div class="section">

                <h4>🚆 Train Details</h4>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Train Number</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{trainNumber}"
                                readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Train Name</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{trainName}"
                                readonly>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Travel Class</label>

                        <select
                                class="form-select"
                                th:field="*{travelClass}">

                            <option value="Sleeper">Sleeper</option>

                            <option value="AC 3 Tier">AC 3 Tier</option>

                            <option value="AC 2 Tier">AC 2 Tier</option>

                            <option value="First Class">First Class</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Seats</label>

                        <input
                                type="number"
                                class="form-control"
                                th:field="*{seats}"
                                min="1"
                                max="6">

                    </div>

                </div>

            </div>

            <div class="d-grid mt-4">

                <button
                        class="btn btn-update"
                        type="submit">

                    💾 Update Reservation

                </button>

            </div>

            <div class="text-center mt-3">

                <a href="/reservations"
                   class="btn btn-outline-light btn-back">

                    ← Back to My Reservations

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
