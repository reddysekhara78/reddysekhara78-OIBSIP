<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Book Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/book-ticket.css}">
</head>

<body>

<div class="background">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
</div>

<div class="container-fluid py-5">

    <div class="text-center mb-4">

        <h1 class="title">
            🚆 Online Railway Reservation
        </h1>

        <p class="subtitle">
            Book your journey safely and comfortably
        </p>

    </div>

    <div class="row justify-content-center">

        <!-- Booking Form -->

        <div class="col-lg-7">

            <div class="booking-card">

                <h3 class="mb-4">
                    Passenger Details
                </h3>

                <form th:action="@{/book}"
                      th:object="${reservation}"
                      method="post">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>
                                👤 Passenger Name
                            </label>

                            <input type="text"
                                   id="passengerName"
                                   class="form-control"
                                   th:field="*{passengerName}"
                                   required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>
                                🎂 Age
                            </label>

                            <input type="number"
                                   id="age"
                                   class="form-control"
                                   th:field="*{age}"
                                   min="1"
                                   max="120"
                                   required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>
                                🚻 Gender
                            </label>

                            <select class="form-select"
        id="gender"
        th:field="*{gender}"
        onchange="updatePreview()"
        required>

    <option value="">🚻 Select Gender</option>

    <option value="Male">👨 Male</option>

    <option value="Female">👩 Female</option>

    <option value="Transgender">⚧️ Transgender</option>

    <option value="Prefer Not to Say">🙈 Prefer Not to Say</option>

</select>
                        </div>

                        <div class="col-md-6 mb-3">

                            <label>
                                📱 Mobile
                            </label>

                            <input type="text"
                                   id="mobile"
                                   class="form-control"
                                   th:field="*{mobile}"
                                   maxlength="10"
                                   pattern="[0-9]{10}"
                                   required>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label>
                            📧 Email
                        </label>

                        <input type="email"
                               id="email"
                               class="form-control"
                               th:field="*{email}"
                               required>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>
                                📅 Journey Date
                            </label>

                            <input type="date"
                                   id="journeyDate"
                                   class="form-control"
                                   th:field="*{journeyDate}"
                                   required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>
                                🚉 Select Train
                            </label>

                            <select id="trainSelect"
                                    class="form-select"
                                    onchange="fillTrainDetails();updatePreview();">

                                <option value="">Select Train</option>

                                <option
                                    th:each="train : ${trains}"
                                    th:value="${train.trainNumber}"
                                    th:text="${train.trainNumber+' - '+train.trainName}"
                                    th:data-name="${train.trainName}"
                                    th:data-source="${train.source}"
                                    th:data-destination="${train.destination}">
                                </option>

                            </select>

                        </div>

                    </div>

                    <input type="hidden"
                           id="trainNumber"
                           th:field="*{trainNumber}">

                    <input type="hidden"
                           id="trainName"
                           th:field="*{trainName}">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>
                                📍 Source
                            </label>

                            <input type="text"
                                   id="source"
                                   class="form-control"
                                   th:field="*{source}"
                                   readonly>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>
                                📍 Destination
                            </label>

                            <input type="text"
                                   id="destination"
                                   class="form-control"
                                   th:field="*{destination}"
                                   readonly>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>
                                💺 Travel Class
                            </label>

                            <select class="form-select"
        id="travelClass"
        th:field="*{travelClass}"
        onchange="updatePreview()"
        required>

    <option value="">🚆 Select Travel Class</option>

    <option value="General">🪑 General (Unreserved)</option>

    <option value="Sleeper">🛏️ Sleeper (SL)</option>

    <option value="AC 3 Tier">❄️ AC 3 Tier (3A)</option>

    <option value="AC 2 Tier">💺 AC 2 Tier (2A)</option>

    <option value="AC First Class">👑 AC First Class (1A)</option>

    <option value="Executive Chair Car">💼 Executive Chair Car (EC)</option>

    <option value="Chair Car">🪑 Chair Car (CC)</option>

</select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>
                                🎟 Seats
                            </label>

                            <input type="number"
                                   id="seats"
                                   class="form-control"
                                   th:field="*{seats}"
                                   min="1"
                                   max="6"
                                   oninput="updatePreview()"
                                   required>

                        </div>

                    </div>

                    <button class="btn btn-primary btn-lg w-100 mt-3">

                        🚆 Book Ticket

                    </button>

                </form>

            </div>

        </div>

        <!-- Live Preview -->

        <div class="preview-card">

    <h3>🎫 Ticket Preview</h3>

    <div class="ticket-row">

        <div class="ticket-item">
            <label>Passenger</label>
            <span id="pName">---</span>
        </div>

        <div class="ticket-item">
            <label>Train</label>
            <span id="pTrain">---</span>
        </div>

        <div class="ticket-item">
            <label>Class</label>
            <span id="pClass">---</span>
        </div>

    </div>

    <div class="ticket-row">

        <div class="ticket-item">
            <label>Source</label>
            <span id="pSource">---</span>
        </div>

        <div class="ticket-item">
            <label>Destination</label>
            <span id="pDestination">---</span>
        </div>

        <div class="ticket-item">
            <label>Date</label>
            <span id="pDate">---</span>
        </div>

    </div>

    <div class="ticket-row">

        <div class="ticket-item">
            <label>Seats</label>
            <span id="pSeats">1</span>
        </div>

        <div class="ticket-item">
            <label>Gender</label>
            <span id="pGender">---</span>
        </div>

        <div class="ticket-item">
            <label>Status</label>
            <span style="color:green;">BOOKED</span>
        </div>

    </div>

</div>
    </div>

</div>
<script>

// ------------------------------
// Fill Train Details
// ------------------------------

function fillTrainDetails(){

    let select=document.getElementById("trainSelect");

    let option=select.options[select.selectedIndex];

    if(option.value===""){

        document.getElementById("trainNumber").value="";
        document.getElementById("trainName").value="";
        document.getElementById("source").value="";
        document.getElementById("destination").value="";

        updatePreview();

        return;
    }

    document.getElementById("trainNumber").value=option.value;

    document.getElementById("trainName").value=
    option.getAttribute("data-name");

    document.getElementById("source").value=
    option.getAttribute("data-source");

    document.getElementById("destination").value=
    option.getAttribute("data-destination");

    updatePreview();

}


// ------------------------------
// Live Ticket Preview
// ------------------------------

function updatePreview(){

document.getElementById("pName").innerHTML=
document.getElementById("passengerName").value || "---";

let train=document.getElementById("trainSelect");

document.getElementById("pTrain").innerHTML=
train.options[train.selectedIndex].text || "---";

document.getElementById("pSource").innerHTML=
document.getElementById("source").value || "---";

document.getElementById("pDestination").innerHTML=
document.getElementById("destination").value || "---";

document.getElementById("pDate").innerHTML=
document.getElementById("journeyDate").value || "---";

document.getElementById("pClass").innerHTML=
document.getElementById("travelClass").value || "---";

document.getElementById("pSeats").innerHTML=
document.getElementById("seats").value || "1";

}


// ------------------------------
// Update Preview while typing
// ------------------------------

document.querySelectorAll("input,select").forEach(function(item){

item.addEventListener("keyup",updatePreview);

item.addEventListener("change",updatePreview);

});


// ------------------------------
// Booking Button Animation
// ------------------------------

document.querySelector("form").addEventListener("submit",function(){

let btn=document.querySelector("button[type='submit']");

btn.disabled=true;

btn.innerHTML=`
<span class="spinner-border spinner-border-sm"></span>
 Booking Ticket...
`;

});


// ------------------------------
// Today's Date Minimum
// ------------------------------

let today=new Date().toISOString().split("T")[0];

document.getElementById("journeyDate").setAttribute("min",today);


// ------------------------------
// Mobile Validation
// ------------------------------

document.getElementById("mobile").addEventListener("input",function(){

this.value=this.value.replace(/[^0-9]/g,'');

});


// ------------------------------
// Passenger Name Validation
// ------------------------------

document.getElementById("passengerName").addEventListener("input",function(){

this.value=this.value.replace(/[^a-zA-Z ]/g,'');

});


// ------------------------------
// Initialize Preview
// ------------------------------

updatePreview();

</script>
</body>

</html>
