<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smart ATM Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            background:#f4f7fc;
            font-family:Arial, Helvetica, sans-serif;
        }

        .navbar{
            background:#0d6efd;
        }

        .navbar-brand{
            color:white;
            font-weight:bold;
        }

        .navbar-brand:hover{
            color:white;
        }

        .card{
            border:none;
            border-radius:15px;
        }

        .card:hover{
            transform:translateY(-5px);
            transition:.3s;
        }

        .balance{
            background:linear-gradient(135deg,#198754,#28a745);
            color:white;
        }

        .deposit{
            background:linear-gradient(135deg,#0d6efd,#4d9cff);
            color:white;
        }

        .withdraw{
            background:linear-gradient(135deg,#dc3545,#ff6b6b);
            color:white;
        }

        .action-btn{
            width:100%;
            height:60px;
            font-size:18px;
            font-weight:bold;
        }

        canvas{
            max-height:300px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">
            SMART ATM
        </a>

        <a href="/logout" class="btn btn-light">
            Logout
        </a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">
        Welcome,
        <span th:text="${user.fullName}">User</span>
    </h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card balance shadow">
                <div class="card-body">

                    <h5>Account Balance</h5>

                    <h2>
    ₹<span th:text="${account.balance}">
    </span>
</h2>

                </div>
            </div>
        </div>

        <div class="col-md-4">

            <div class="card deposit shadow">

                <div class="card-body">

                    <h5>Total Deposits</h5>

                    <h2 id="depositTotal">₹0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card withdraw shadow">

                <div class="card-body">

                    <h5>Total Withdrawals</h5>

                    <h2 id="withdrawTotal">₹0</h2>
                </div>

            </div>

        </div>
        <div class="col-md-4">

    <div class="card shadow" style="background:linear-gradient(135deg,#ffc107,#ffca2c); color:white;">

        <div class="card-body">

            <h5>Total Transfers</h5>

            <h2 id="transferTotal">₹0</h2>

        </div>

    </div>

</div>

    </div>

    <div class="row mt-5 g-3">

    <div class="col-md">
        <a href="/deposit" class="btn btn-success action-btn w-100">
            Deposit
        </a>
    </div>

    <div class="col-md">
        <a href="/withdraw" class="btn btn-danger action-btn w-100">
            Withdraw
        </a>
    </div>

    <div class="col-md">
        <a href="/transfer" class="btn btn-warning action-btn w-100">
            Transfer
        </a>
    </div>

    <div class="col-md">
        <a href="/statement" class="btn btn-dark action-btn w-100">
            Mini Statement
        </a>
    </div>

    <div class="col-md">
        <a href="/profile" class="btn btn-primary action-btn w-100">
            👤 My Profile
        </a>
    </div>

</div>

    <div class="row mt-5 g-4">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header fw-bold">
                    Monthly Transactions
                </div>
                

                <div class="card-body">

                    <canvas id="transactionChart"></canvas>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-header fw-bold">
                    Transaction Types
                </div>

                <div class="card-body">

                    <canvas id="pieChart"></canvas>

                </div>

            </div>

        </div>

    </div>

</div>
<div class="container mt-5">


<div class="card shadow">


<div class="card-header bg-dark text-white">

    Recent Transactions

</div>


<div class="card-body">


<table class="table table-hover">


<thead>

<tr>

<th>Type</th>

<th>Amount</th>

<th>Date</th>

<th>Status</th>

</tr>

</thead>


<tbody>


<tr th:each="transaction : ${transactions}">


<td>

    <span th:if="${transaction.transactionType.name() == 'DEPOSIT'}"
          class="badge bg-success">
        Deposit
    </span>

    <span th:if="${transaction.transactionType.name() == 'WITHDRAW'}"
          class="badge bg-danger">
        Withdraw
    </span>

    <span th:if="${transaction.transactionType.name() == 'TRANSFER'}"
          class="badge bg-primary">
        Transfer
    </span>

</td>



<td class="fw-bold text-success">
    ₹<span th:text="${transaction.amount}"></span>
</td>



<td>

<span th:text="${#temporals.format(transaction.transactionDate, 'dd-MM-yyyy HH:mm')}">
</span>

</td>



<td>

<span class="badge bg-success"
      th:text="${transaction.status}">
</span>

</td>


</tr>


</tbody>


</table>


</div>


</div>


</div>

<script src="/js/dashboard.js"></script>

</body>
</html>
