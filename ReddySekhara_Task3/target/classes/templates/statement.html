<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Mini Statement</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow border-0">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h3 class="mb-0">Mini Statement</h3>

            <div>

                <a href="/statement/pdf"
                   class="btn btn-danger btn-sm me-2">

                    📄 Download PDF

                </a>

                <a href="/dashboard"
                   class="btn btn-light btn-sm">

                    ← Dashboard

                </a>

            </div>

        </div>

        <div class="card-body">

            <div class="row mb-3">

                <div class="col-md-6">

                    <h5>
                        Account Number :
                        <span class="text-primary"
                              th:text="${account.accountNumber}">
                        </span>
                    </h5>

                </div>

                <div class="col-md-6 text-end">

                    <h5>
                        Current Balance :
                        <span class="text-success">
                            ₹<span th:text="${account.balance}"></span>
                        </span>
                    </h5>

                </div>

            </div>

            <table class="table table-striped table-hover table-bordered align-middle">

                <thead class="table-dark">

                <tr>

                    <th>Transaction ID</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Date & Time</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="transaction : ${transactions}">

                    <td th:text="${transaction.transactionId}"></td>

                    <td th:text="${transaction.transactionType}"></td>

                    <td class="fw-bold">

                        ₹<span th:text="${transaction.amount}"></span>

                    </td>

                    <td th:text="${transaction.description}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:text="${transaction.status}">
                        </span>

                    </td>

                    <td th:text="${#temporals.format(transaction.transactionDate,'dd-MM-yyyy HH:mm')}"></td>

                </tr>

                </tbody>

            </table>

            <div class="mt-3">

                <strong>
                    Total Transactions :
                </strong>

                <span th:text="${#lists.size(transactions)}"></span>

            </div>

        </div>

    </div>

</div>

</body>

</html>
